<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none" role="img" aria-label="EMC — Error Makes Clever">
  <!-- emc wordmark -->
  <text
    x="160" y="185"
    font-family="'Nunito', 'DM Sans', system-ui, sans-serif"
    font-weight="800"
    font-size="118"
    letter-spacing="-3"
    fill="#1565D8"
    text-anchor="middle"
    dominant-baseline="auto"
  >emc</text>

  <!-- Green diagonal slash through the "e" -->
  <!-- "e" in centered "emc" at 118px is approx x=28..88, mid-height ~145 -->
  <rect
    x="-34" y="-6"
    width="76" height="12"
    rx="6"
    fill="#3DC55E"
    transform="translate(58 152) rotate(-34)"
  />

  <!-- Subtitle -->
  <text
    x="160" y="226"
    font-family="'DM Sans', system-ui, sans-serif"
    font-weight="500"
    font-size="22"
    letter-spacing="0.5"
    fill="#1a1a1a"
    text-anchor="middle"
  >error makes clever</text>
</svg>
